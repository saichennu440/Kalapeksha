<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Primary Meta -->
    <title>Kalapeksha</title>
    <meta name="title" content="Kalapeksha" />
    <meta name="description" content=" kalapeksha is a platform for showcasing creative work and connecting with artists " />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn use these) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kalapeksha" />
    <meta property="og:url" content="https://kalapeksha.com/" />
    <meta property="og:title" content="Kalapeksha" />
    <meta property="og:description" content=" kalapeksha is a platform for showcasing creative work and connecting with artists " />

    <!-- ✅ MUST be absolute URL with https:// for WhatsApp to load it -->
    <meta property="og:image" content="https://kalapeksha.com/Kalapeksha_logo.png" />
    <meta property="og:image:secure_url" content="https://kalapeksha.com/Kalapeksha_logo.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kalapeksha" />
    <meta name="twitter:description" content=" kalapeksha is a platform for showcasing creative work and connecting with artists " />
    <meta name="twitter:image" content="https://kalapeksha.com/Kalapeksha_logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
